task:
  name: Eggshell Skull Rule Legal Memorandum (Agent Judge)
  description: |
    Can you please draft a short legal memorandum analyzing whether the eggshell skull rule applies with respect to the plaintiffs' claims against us in the wrongful death complaint? Please also conclude on the extent of Grove Garden Living's liability in your analysis and note the relevant facts. Create a new docx file with your findings.
  files: ["memorandum.docx"]
  tips: |
    - Use the document tools (MCP) to read .docx files — the Read tool cannot open binary .docx formats.
    - Use the spreadsheet tools (MCP) to read .xlsx files — the Read tool cannot open binary .xlsx formats.
    - Use the PDF tools (MCP) to read PDF documents.
    - Use the filesystem tools (MCP) to explore available files in the working directory.
    - You are evaluated by an agent judge with PASS/FAIL criteria.
    - The judge autonomously generates and evolves evaluation criteria.
    - Check .claude/rubrics/current.md for the active rubric and version.
  evaluation_guidance: |
    This is a legal analysis task. Prioritize:
    - Whether the analysis seriously considers BOTH sides — the eggshell skull rule applying AND not applying.
    - Whether conclusions are grounded in specific evidence from case documents, not general legal principles.
    - Whether the analysis identifies and engages with the strongest counterarguments to its own conclusion.
    - Quality of legal reasoning over comprehensiveness of coverage.
  rubrics: []  # auto-generated by agent judge

grader:
  type: agent_judge
  timeout: 600
  direction: maximize
  args:
    model: minimax/MiniMax-M2.7
    runtime: opencode
    judge_max_turns: 30
    max_criteria: 15
    min_criteria: 3

agents:
  count: 1
  runtime: opencode
  model: minimax/MiniMax-M2.7
  timeout: 1800
  mcp_servers:
    spreadsheets:
      command: "uv"
      args: ["run", "--project", "${ARCHIPELAGO_PATH}/mcp_servers/spreadsheets", "python", "${ARCHIPELAGO_PATH}/mcp_servers/spreadsheets/mcp_servers/sheets_server/main.py"]
      env:
        APP_FS_ROOT: "${WORKTREE_PATH}"
        MCP_TRANSPORT: "stdio"
    documents:
      command: "uv"
      args: ["run", "--project", "${ARCHIPELAGO_PATH}/mcp_servers/documents", "python", "${ARCHIPELAGO_PATH}/mcp_servers/documents/mcp_servers/docs_server/main.py"]
      env:
        APP_FS_ROOT: "${WORKTREE_PATH}"
        MCP_TRANSPORT: "stdio"
    pdfs:
      command: "uv"
      args: ["run", "--project", "${ARCHIPELAGO_PATH}/mcp_servers/pdfs", "python", "${ARCHIPELAGO_PATH}/mcp_servers/pdfs/mcp_servers/pdf_server/main.py"]
      env:
        APP_FS_ROOT: "${WORKTREE_PATH}"
        MCP_TRANSPORT: "stdio"
    filesystem:
      command: "uv"
      args: ["run", "--project", "${ARCHIPELAGO_PATH}/mcp_servers/filesystem", "python", "${ARCHIPELAGO_PATH}/mcp_servers/filesystem/mcp_servers/filesystem_server/main.py"]
      env:
        APP_FS_ROOT: "${WORKTREE_PATH}"
        MCP_TRANSPORT: "stdio"

workspace:
  repo_path: ./examples/apex-eggshell-skull/repo
