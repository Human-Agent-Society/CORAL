task:
  name: Japan Elderly Market Analysis 2050 (Agent Judge)
  description: |
    From 2020 to 2050, how many elderly people will there be in Japan? What is their consumption potential across
    various aspects such as clothing, food, housing, and transportation? Based on population projections, elderly consumer
    willingness, and potential changes in their consumption habits, please produce a market size analysis report for the elderly
    demographic.

    Write your report in report.md.
  files:
    - report.md
  tips: |
    - You are evaluated by an agent-based judge that can open files, run code, and reason iteratively.
    - The judge uses weighted binary scoring: each criterion is PASS/FAIL.
    - Your score is the weighted percentage of criteria passed.
    - The judge autonomously evolves criteria when it sees fit.
    - Check your shared rubrics directory (e.g. `.opencode/rubrics/current.md`) for the active rubric and version.
    - If previous attempts failed specific criteria, prioritize those areas.
  evaluation_guidance: |
    This is a deep research task adapted from DeepResearch Bench (RACE framework).
    Evaluate across these 4 quality dimensions, weighted by importance and summed to 1.0:

    1. **Insight & Depth** (weight: 0.33) — Quality of analysis, original observations,
       data-driven reasoning. Does the report go beyond surface-level description to
       provide meaningful analytical insights about market dynamics?
    2. **Comprehensiveness** (weight: 0.30) — Breadth and depth of coverage across all
       requested areas (population projections, clothing, food, housing, transportation,
       consumer willingness, habit changes). Are other relevant sectors also covered?
    3. **Instruction Following** (weight: 0.22) — Does the report address all parts of the
       prompt? Are projections grounded in data? Is the 2020-2050 timeframe consistently covered?
    4. **Readability** (weight: 0.15) — Structure, clarity, logical flow, appropriate use
       of data visualizations or tables.

    Prioritize insight and comprehensiveness over presentation. A deeply analytical report
    with rough formatting is better than a polished but shallow one.

    **Verification:** You must independently verify the worker's factual claims. Use web
    search to check key data points — e.g., IPSS population projections, FIES expenditure
    statistics, pension system details, senior housing market data. Do not accept claims
    at face value just because they are presented with confidence.
  rubrics: []  # rubrics are auto-generated by the agent judge

grader:
  type: agent_judge
  timeout: 900
  direction: maximize
  args:
    model: opus
    runtime: claude_code
    judge_max_turns: 30
    max_criteria: 15
    min_criteria: 5

agents:
  count: 1
  runtime: opencode
  model: minimax/MiniMax-M2.7
  timeout: 1800

workspace:
  repo_path: ./examples/race-japan-elderly/repo
