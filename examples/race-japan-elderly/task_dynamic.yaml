task:
  name: Japan Elderly Market Analysis 2050 (Dynamic Rubric)
  description: |
    From 2020 to 2050, how many elderly people will there be in Japan? What is their consumption potential across
    various aspects such as clothing, food, housing, and transportation? Based on population projections, elderly consumer
    willingness, and potential changes in their consumption habits, please produce a market size analysis report for the elderly
    demographic.

    Write your report in report.md.
  files:
    - report.md
  tips: |
    - You are evaluated by an auto-generated rubric that evolves over time.
    - The evaluator generates criteria covering comprehensiveness, insight, instruction following, and readability.
    - Scores are continuous (0-1), not binary pass/fail.
    - Focus on data-driven analysis with quantitative projections.
    - Check your eval feedback for the current rubric version and criteria.
    - If previous attempts scored low on specific criteria, prioritize those areas.
  rubrics: []  # rubrics are auto-generated by the dynamic rubric judge

grader:
  type: dynamic_rubric_judge
  timeout: 600
  direction: maximize
  private:
    - eval/reference_article.md
  args:
    judge_model: gpt-4o-mini
    generator_model: claude-sonnet-4-20250514
    scoring_mode: scored
    evolve_every: 5
    evolve_on_plateau: 3
    max_criteria: 15
    min_criteria: 5
    reference_files: []

agents:
  count: 1
  runtime: opencode
  model: minimax/MiniMax-M2.7
  timeout: 1800

workspace:
  repo_path: ./examples/race-japan-elderly/repo
