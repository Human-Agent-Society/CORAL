task:
  name: "Frontier-Eng · Cryptographic/SHA3-256"
  description: |
    # SHA3-256 (Secure Hash Algorithm 3 256-bit)

    SHA3-256 is the latest generation hash function standard selected by NIST through the Open Cryptography Competition (FIPS 202). It uses the Keccak algorithm at its core and also outputs a 256-bit digest.

    SHA3-256 employs a sponge construction that is significantly different from SHA-2. It relies on a massive 1600-bit internal state space and is mainly divided into two stages:

    - **Absorbing Stage**: The input message is divided into blocks according to a set bitrate, XORed with the first half of the state space, and the Keccak-f core permutation function is applied to the entire state space.

    - **Squeezing Stage**: After absorbing all the message, the required length (256 bits) of hash output is directly extracted from the first half of the state space.

    Your task is to modify `baseline/SHA3-256.cpp` to improve its algorithm implementation efficiency (throughput). Note that the algorithm's correctness will also be verified during evaluation.

    For detailed algorithm content and input/output, please refer to `references`.
  tips: |
    UnifiedTask constraints:
    1) Only modify `baseline/SHA3-256.cpp`.
    2) Preserve the public entrypoint, function signatures, and output contract expected by `frontier_eval/evaluator.py`.
    3) Do not modify benchmark assets, documentation, references, verification code, runtime helpers, tests, or `frontier_eval/` metadata.
    4) If the task produces named outputs such as `submission.json`, `results.txt`, `solution.json`, or `prediction.h5ad`, keep the expected filename and schema unchanged.
    5) Prioritize validity and correctness before optimization.

    Workflow notes (CORAL):
    - The seed mirrors the benchmark directory from EinsiaLab/Frontier-Engineering.
    - Runtime: deps are pulled from `_runtime/requirements.txt` (env: `frontier-eval-driver`).
      Edit it if you need additional packages installed in the worktree venv.
    - The grader reads `frontier_eval/` metadata to run the benchmark's eval command.
    - Edit the candidate file referenced by `frontier_eval/candidate_destination.txt`
      (default falls back to `frontier_eval/initial_program.txt`).
    - The eval is staged in a sandbox copy of the codebase; outputs land at
      `<sandbox>/metrics.json` (combined_score + valid).
    - If the seed contains a `_parent/` directory, those are shared files copied
      from the parent benchmark domain — read-only by convention.

