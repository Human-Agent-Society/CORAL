# Generated by examples/frontier_eng/_scripts/generate_tasks.py
# Source: https://github.com/EinsiaLab/Frontier-Engineering
# Benchmark id: EngDesign

task:
  name: "Frontier-Eng · EngDesign"
  description: |
    # Task Description

    All tasks are from [EngDesign](https://github.com/AGI4Engineering/EngDesign/tree/main). Please refer to `LLM_prompt.txt` in the corresponding directory for detailed descriptions.
  tips: |
    EngDesign UnifiedTask constraints:
    1) Only modify `submission/engdesign_submission.py`.
    2) Keep the top-level variable name `SUBMISSION` as a Python dict.
    3) Keep all benchmark/evaluator infrastructure files unchanged under `frontier_eval/` and task folders.
    4) Keep required task keys in `SUBMISSION`:
       - AM_02, AM_03, CY_03, WJ_01, XY_05, YJ_02, YJ_03
    5) `CY_03` must provide Python function source strings for:
       - `vioblk_read`
       - `vioblk_write`
    6) `CY_03` submissions must NOT reference benchmark-internal gold helpers:
       - `gold_vioblk_read`
       - `gold_vioblk_write`
    7) `WJ_01` must provide `function_code` that defines:
       - `def denoise_image(noisy_img): ...`
    8) Keep output format compatible with each task's `output_structure.py`.

    Workflow notes (CORAL):
    - The seed mirrors the benchmark directory from EinsiaLab/Frontier-Engineering.
    - Runtime: deps are pulled from `_runtime/requirements.txt` (env: `frontier-eval-driver`).
      Edit it if you need additional packages installed in the worktree venv.
    - The grader reads `frontier_eval/` metadata to run the benchmark's eval command.
    - Edit the candidate file referenced by `frontier_eval/candidate_destination.txt`
      (default falls back to `frontier_eval/initial_program.txt`).
    - The eval is staged in a sandbox copy of the codebase; outputs land at
      `<sandbox>/metrics.json` (combined_score + valid).
    - If the seed contains a `_parent/` directory, those are shared files copied
      from the parent benchmark domain — read-only by convention.

grader:
  entrypoint: "frontier_eng_grader.grader:Grader"
  setup:
    - "uv pip install -e ../_grader"
  timeout: 7200
  direction: maximize
  args:
    benchmark_id: "EngDesign"

agents:
  count: 1
  runtime: claude_code
  model: claude-opus-4-6

workspace:
  results_dir: "./results"
  repo_path: "./examples/frontier_eng/EngDesign/seed"
  setup:
    - "uv sync"

run:
  verbose: false
  ui: false
  session: tmux
