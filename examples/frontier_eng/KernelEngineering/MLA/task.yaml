# Generated by examples/frontier_eng/_scripts/generate_tasks.py
# Source: https://github.com/EinsiaLab/Frontier-Engineering
# Benchmark id: KernelEngineering/MLA

task:
  name: "Frontier-Eng · KernelEngineering/MLA"
  description: |
    # Description

    You will implement a custom mla decode kernel optimized for MI300, a few things simplified here:

    1. Q, K, V data type as bfloat16

    2. decode only with pre-allocated non-paged latent kv cache

    3. return the update kv cache with MLA output

    The shapes of all outer and inner dimensions of tensors are from DeepSeek-R1, and split number of heads to fit in one GPU. To be explicit, you will be given a tuple to tensors:
    ```
    input [bs, sq, dim]
    attn_output [bs, n_heads, sq, v_head_dim]
    kv_cache [bs, sq, kv_lora_rank + qk_rope_head_dim]
    ```
    where

    0. bs::128 # batch size
    1. prefill::[512, 2048, 4096, 6144] # as kv length
    2. sq::1 # as only consider decoding
    3. dim::7168 # hidden size of deepseek v3
    4. kv_lora_rank::[512] # kv lora rank of deepseek v3
    5. qk_rope_head_dim::[64] # rope embedding dimension
    6. v_head_dim::128 # head size
    7. n_heads::128 # num of attn heads

    The ranking criteria is the geometric mean of the benchmark results.

    For the grand prize, your kernel will be evaluated against the speed of light analysis and the solution closest to the speed of light will be awarded the grand prize.

    The speed of light analysis is::

    | **bs** | **prefill sq** | **dtype** | **roofline time(us)** |
    | :--- | :--- | :--- | :--- |
    | 128 | 512 | bf16 | 54.62 |
    | 128 | 2048 | bf16 | 141.16 |
    | 128 | 4096 | bf16 | 210.75 |
    | 128 | 6144 | bf16 | 280.87 |
  tips: |
    UnifiedTask constraints:
    1) Only modify `baseline/submission.py`.
    2) Preserve the public entrypoint, function signatures, and output contract expected by `frontier_eval/evaluator.py`.
    3) Do not modify benchmark assets, documentation, references, verification code, runtime helpers, tests, or `frontier_eval/` metadata.
    4) If the task produces named outputs such as `submission.json`, `results.txt`, `solution.json`, or `prediction.h5ad`, keep the expected filename and schema unchanged.
    5) Prioritize validity and correctness before optimization.

    Workflow notes (CORAL):
    - The seed mirrors the benchmark directory from EinsiaLab/Frontier-Engineering.
    - Runtime: deps are pulled from `_runtime/requirements.txt` (env: `frontier-v1-kernel`).
      Edit it if you need additional packages installed in the worktree venv.
    - The grader reads `frontier_eval/` metadata to run the benchmark's eval command.
    - Edit the candidate file referenced by `frontier_eval/candidate_destination.txt`
      (default falls back to `frontier_eval/initial_program.txt`).
    - The eval is staged in a sandbox copy of the codebase; outputs land at
      `<sandbox>/metrics.json` (combined_score + valid).
    - If the seed contains a `_parent/` directory, those are shared files copied
      from the parent benchmark domain — read-only by convention.

grader:
  entrypoint: "frontier_eng_grader.grader:Grader"
  setup:
    - "uv pip install -e ./grader"
  timeout: 1800
  direction: maximize
  args:
    benchmark_id: "KernelEngineering/MLA"

agents:
  count: 1
  runtime: claude_code
  model: claude-opus-4-6

workspace:
  results_dir: "./results"
  repo_path: "./examples/frontier_eng/KernelEngineering/MLA/seed"
  setup:
    - "uv sync"

run:
  verbose: false
  ui: false
  session: tmux
