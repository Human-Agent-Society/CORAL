task:
  name: "Frontier-CS: cant_be_late (high_availability_loose_deadline_large_overhead) (TTT)"
  description: |
    Solve the 'cant_be_late (high_availability_loose_deadline_large_overhead)' research problem from the Frontier-CS benchmark.

    Read the full problem statement in `statement.md`.
    Write your solution in `solution.py`.

    Your score will be 0-100 based on solution quality.
  tips: |
    - Read statement.md carefully for the exact interface and scoring formula.
    - Evaluation timeout: 1800s.
    - Language: python.

grader:
  timeout: 1800
  direction: maximize
  args:
    problem_name: cant_be_late
    variant_name: "high_availability_loose_deadline_large_overhead"
    language: python
    needs_gpu: false

agents:
  count: 1
  runtime: opencode
  model: sglang/qwen3-4b
  research: false
  max_turns: 200
  gateway:
    enabled: true
    config: "./seed/litellm_config.yaml"
  heartbeat:
    - name: reflect
      every: 5
    - name: diagnose
      every: 5

workspace:
  results_dir: "./results"
  repo_path: "./ttt/examples/frontier_cs_tasks/cant_be_late__high_availability_loose_deadline_large_overhead/seed"

run:
  verbose: false
  ui: false
  session: local
