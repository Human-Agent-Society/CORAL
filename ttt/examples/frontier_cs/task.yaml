task:
  name: "Frontier-CS: Cant-Be-Late Scheduling (TTT)"
  description: |
    You are an expert programmer specializing in optimization and scheduling algorithms.
    Your task is to implement a cloud compute scheduling strategy that minimizes cost
    while meeting a hard deadline.

    At each time step, you decide whether to use Spot instances (cheap but unreliable),
    On-Demand instances (expensive but guaranteed), or pause (NONE).

    Read the full problem statement in `statement.md`.
    Write your solution in `solution.py`.

    Your Solution class must inherit from Strategy and implement the _step() method:

        class Solution(Strategy):
            NAME = "my_solution"

            def _step(self, last_cluster_type, has_spot) -> ClusterType:
                # Return ClusterType.SPOT, ClusterType.ON_DEMAND, or ClusterType.NONE
                ...

    Score: 0-100 based on cost minimization (lower cost → higher score).
    Failing to meet the deadline gives -100000 penalty.
  tips: |
    - Read statement.md carefully for the exact interface and scoring formula.
    - Eval timeout is 1800s. If your solution takes longer, it scores 0.
    - Focus on balancing cost vs deadline risk using spot availability patterns.
    - The evaluator tests against real Spot instance traces.
    - Key attributes in _step: self.env.elapsed_seconds, self.task_duration,
      self.deadline, self.restart_overhead.

grader:
  timeout: 1800
  direction: maximize
  args:
    problem_name: cant_be_late
    variant_name: high_availability_loose_deadline_large_overhead
    language: python
    needs_gpu: false

agents:
  count: 1
  runtime: opencode
  model: sglang/qwen3-4b
  research: false
  max_turns: 200
  gateway:
    enabled: true
    config: "./seed/litellm_config.yaml"
  heartbeat:
    - name: reflect
      every: 5
    - name: diagnose
      every: 5

workspace:
  results_dir: "./results"
  repo_path: "./ttt/examples/frontier_cs/seed"

run:
  verbose: false
  ui: false
  session: local
